name: Daily salary refresh

on:
  schedule:
    - cron: "10 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run update:salaries
      - name: Commit refreshed salary data
        run: |
          if [ -n "$(git status --porcelain -- data src/data/jobs.generated.ts)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/jobs.normalized.json data/jobs.seed.json data/analysis.json src/data/jobs.generated.ts
            git commit -m "Refresh daily salary data"
            git push
          fi
